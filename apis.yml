aid: td-synnex
name: TD SYNNEX
description: >-
  TD SYNNEX is one of the world's largest IT distributors and solutions aggregators,
  serving over 150,000 resellers, retailers, and other customers in more than 100 countries.
  The company provides technology distribution, integration, and solutions services.
  TD SYNNEX offers the StreamOne Ion platform with REST APIs that enable partners to
  manage cloud subscriptions, customers, orders, and billing through a unified interface
  supporting multiple cloud vendors. Named NVIDIA EMEA Distributor of the Year 2026.
