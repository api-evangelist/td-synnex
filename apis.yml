apis:
  - aid: td-synnex:streamone-ion
    name: TD SYNNEX StreamOne Ion API
    description: >-
      The StreamOne Ion Partner API provides partners with programmatic access to
      TD SYNNEX cloud distribution services. Enables management of end customers,
      product catalogs, orders, subscriptions, shopping carts, and reporting through
      a unified REST interface supporting multiple cloud vendors. Uses OAuth 2.0
      authentication with refresh token flow.
    humanURL: https://docs.streamone.cloud/
    baseURL: https://ion.tdsynnex.com
