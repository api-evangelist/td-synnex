description: Rate-limit behavior for the TD SYNNEX StreamOne Ion API is not publicly documented.
  Access is gated to onboarded reseller partners and any throttling, burst, or quota policy is
  communicated through the partner integration package rather than a public docs page.
sources:
  - https://www.tdsynnex.com/
  - https://streamoneion.tdsynnex.com/
notes: No public rate-limit documentation could be located for the StreamOne Ion API. Limits, scope,
  headers, and response codes are presumed to follow standard partner-API throttling but cannot be
  verified without a partner sandbox.
responseCodes:
  throttled: 429
limits:
  - name: Partner-Defined Limits
    scope: account
    metric: varies
    limit: see partner integration package
    notes: Specific per-second / per-minute / per-day limits are communicated to reseller partners
      during onboarding and are not published publicly.
policies:
  - name: Partner Onboarding
    description: Rate-limit specifics, including burst allowances and quota windows, are issued
      through the TD SYNNEX partner onboarding package. Public documentation does not enumerate
      these values.
