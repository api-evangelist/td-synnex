description: TD SYNNEX exposes the StreamOne Ion API to authorized reseller partners only. The
  StreamOne Ion platform is a partner-gated cloud-distribution and subscription-management surface;
  there is no public self-service signup, published price list, or per-call price card. Commercial
  terms (subscription pricing, distribution margins, rebates) are negotiated under the TD SYNNEX
  partner agreement.
sources:
  - https://www.tdsynnex.com/
  - https://streamoneion.tdsynnex.com/
notes: No public pricing page or developer-facing price list could be reconciled. StreamOne Ion API
  access is restricted to onboarded TD SYNNEX reseller partners; pricing is contractual and is not
  published. Scaffold tiers (Free / Professional / Enterprise) were removed because they are not
  representative of the actual partner-gated commercial model.
