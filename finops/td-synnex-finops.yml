description: FOCUS-aligned FinOps shape for TD SYNNEX is partner-contractual rather than
  consumption-priced. The StreamOne Ion API surface is used by resellers to operate cloud
  subscriptions on behalf of customers; TD SYNNEX bills under partner agreements and does not
  publish a public consumption price book.
sources:
  - https://www.tdsynnex.com/
  - https://streamoneion.tdsynnex.com/
notes: Billing, meters, and FOCUS column values for direct API consumption could not be reconciled
  against a public price list. Commercial terms are negotiated per partner contract. FOCUS columns
  below capture the publisher identity only; ChargeCategory and PricingUnit values would be set by
  the underlying cloud subscriptions resold through StreamOne Ion.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: TD SYNNEX Corporation
serviceCategory: Technology Distribution
billingModel:
  pricingCategory: Contract / Partner-Negotiated
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: TD SYNNEX StreamOne Ion
  ServiceCategory: Technology Distribution
  ProviderName: TD SYNNEX
  PublisherName: TD SYNNEX Corporation
  InvoiceIssuerName: TD SYNNEX Corporation
  BillingCurrency: USD
meters:
  - name: partner_resold_subscription
    unit: varies
    aggregation: sum
    dimensions:
      - vendor
      - customer
      - subscription
principles:
  - name: Visibility
    description: Partners observe resold-subscription consumption through the StreamOne Ion
      reporting surface; there is no first-party usage API for the platform itself.
  - name: Allocation
    description: Cost is allocated by reseller partner, end customer, and the underlying cloud
      vendor whose subscription is being resold.
  - name: Optimization
    description: Optimization levers live at the resold-vendor layer (e.g. AWS / Azure / Google
      committed use) rather than at the StreamOne Ion API itself.
  - name: Accountability
    description: The reseller partner is the accountable owner of subscription spend transacted
      through StreamOne Ion.
