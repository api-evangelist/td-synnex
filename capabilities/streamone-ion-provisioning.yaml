naftiko: 1.0.0-alpha2
info:
  label: TD SYNNEX StreamOne Ion Partner API — Provisioning
  description: 'TD SYNNEX StreamOne Ion Partner API — Provisioning. 1 operations. Lead operation: Get Provisioning Info. Self-contained
    Naftiko capability covering one Td Synnex business surface.'
  tags:
  - Td Synnex
  - Provisioning
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TD_SYNNEX_API_KEY: TD_SYNNEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: streamone-ion-provisioning
    baseUri: https://ion.tdsynnex.com
    description: TD SYNNEX StreamOne Ion Partner API — Provisioning business capability. Self-contained, no shared references.
    resources:
    - name: v3-accounts-accountId-provisioningInfo
      path: /v3/accounts/{accountId}/provisioningInfo
      operations:
      - name: getprovisioninginfo
        method: GET
        description: Get Provisioning Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vendor
          in: query
          type: string
          description: Vendor name to retrieve provisioning templates for
        - name: templateId
          in: query
          type: string
          description: Specific provisioning template ID
    authentication:
      type: bearer
      token: '{{env.TD_SYNNEX_API_KEY}}'
  exposes:
  - type: rest
    namespace: streamone-ion-provisioning-rest
    port: 8080
    description: REST adapter for TD SYNNEX StreamOne Ion Partner API — Provisioning. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v3/accounts/{accountid}/provisioninginfo
      name: v3-accounts-accountid-provisioninginfo
      description: REST surface for v3-accounts-accountId-provisioningInfo.
      operations:
      - method: GET
        name: getprovisioninginfo
        description: Get Provisioning Info
        call: streamone-ion-provisioning.getprovisioninginfo
        with:
          vendor: rest.vendor
          templateId: rest.templateId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streamone-ion-provisioning-mcp
    port: 9090
    transport: http
    description: MCP adapter for TD SYNNEX StreamOne Ion Partner API — Provisioning. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-provisioning-info
      description: Get Provisioning Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streamone-ion-provisioning.getprovisioninginfo
      with:
        vendor: tools.vendor
        templateId: tools.templateId
      outputParameters:
      - type: object
        mapping: $.
