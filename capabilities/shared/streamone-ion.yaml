naftiko: "1.0.0-alpha1"

info:
  label: "TD SYNNEX StreamOne Ion Partner API"
  description: >-
    Core API for TD SYNNEX StreamOne Ion cloud distribution platform. Enables
    partners to manage customers, browse products, process orders, track
    subscriptions, manage shopping carts, and access business intelligence
    reports through a single unified interface for multiple cloud vendors.
  tags:
    - TD SYNNEX
    - StreamOne Ion
    - Cloud Distribution
    - Technology Distribution
    - MSP
    - Reseller
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TDSYNNEX_ACCESS_TOKEN: TDSYNNEX_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: streamone-ion
      baseUri: https://ion.tdsynnex.com
      description: "TD SYNNEX StreamOne Ion Partner API for cloud distribution"
      authentication:
        type: bearer
        token: "{{TDSYNNEX_ACCESS_TOKEN}}"
      resources:
        - name: customers
          path: /v3/accounts/{accountId}/customers
          description: "End customer account management"
          operations:
            - name: list-customers
              method: GET
              description: "List all end customers"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: pageSize
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-customer
              method: POST
              description: "Add a new end customer to the platform"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  companyName: "{{tools.companyName}}"
                  email: "{{tools.email}}"
                  phone: "{{tools.phone}}"
                  address: "{{tools.address}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-customer
              method: GET
              description: "Get details for a specific customer"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: customerId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-customer
              method: PUT
              description: "Update an existing customer's information"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: customerId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  companyName: "{{tools.companyName}}"
                  email: "{{tools.email}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: products
          path: /v3/accounts/{accountId}/products
          description: "Technology product catalog"
          operations:
            - name: list-products
              method: GET
              description: "List available technology products"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: vendor
                  in: query
                  type: string
                  required: false
                - name: category
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-product
              method: GET
              description: "Get details for a specific product"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: productId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: orders
          path: /v3/accounts/{accountId}/orders
          description: "Order management"
          operations:
            - name: list-orders
              method: GET
              description: "List all orders for the account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: status
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-order
              method: POST
              description: "Create a new technology product order"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  customerId: "{{tools.customerId}}"
                  items: "{{tools.items}}"
                  notes: "{{tools.notes}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-order
              method: GET
              description: "Get details for a specific order"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: orderId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: subscriptions
          path: /v3/accounts/{accountId}/customers/{customerId}/subscriptions
          description: "Cloud subscription management"
          operations:
            - name: list-subscriptions
              method: GET
              description: "List all subscriptions for a customer"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: customerId
                  in: path
                  type: string
                  required: true
                - name: vendor
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reports
          path: /v3/accounts/{accountId}/reports
          description: "Business intelligence reports"
          operations:
            - name: list-reports
              method: GET
              description: "List available business intelligence reports"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-report-data
              method: GET
              description: "Access report data"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                - name: reportId
                  in: path
                  type: string
                  required: true
                - name: format
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: streamone-ion-api
      resources:
        - path: /v1/customers
          name: customers
          operations:
            - method: GET
              name: list-customers
              call: "streamone-ion.list-customers"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/products
          name: products
          operations:
            - method: GET
              name: list-products
              call: "streamone-ion.list-products"
              with:
                accountId: "rest.accountId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: streamone-ion-mcp
      transport: http
      tools:
        - name: list-customers
          description: "List all end customers in the TD SYNNEX partner account"
          hints:
            readOnly: true
            openWorld: false
          call: "streamone-ion.list-customers"
          with:
            accountId: "tools.accountId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-products
          description: "Browse available technology products in the TD SYNNEX catalog"
          hints:
            readOnly: true
            openWorld: true
          call: "streamone-ion.list-products"
          with:
            accountId: "tools.accountId"
            vendor: "tools.vendor"
          outputParameters:
            - type: object
              mapping: "$."
