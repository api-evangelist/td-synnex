naftiko: 1.0.0-alpha2
info:
  label: TD SYNNEX StreamOne Ion Partner API — Authentication
  description: 'TD SYNNEX StreamOne Ion Partner API — Authentication. 1 operations. Lead operation: Get Access Token. Self-contained
    Naftiko capability covering one Td Synnex business surface.'
  tags:
  - Td Synnex
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TD_SYNNEX_API_KEY: TD_SYNNEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: streamone-ion-authentication
    baseUri: https://ion.tdsynnex.com
    description: TD SYNNEX StreamOne Ion Partner API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: oauth-token
      path: /oauth/token
      operations:
      - name: getaccesstoken
        method: POST
        description: Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TD_SYNNEX_API_KEY}}'
  exposes:
  - type: rest
    namespace: streamone-ion-authentication-rest
    port: 8080
    description: REST adapter for TD SYNNEX StreamOne Ion Partner API — Authentication. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/oauth/token
      name: oauth-token
      description: REST surface for oauth-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Get Access Token
        call: streamone-ion-authentication.getaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streamone-ion-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for TD SYNNEX StreamOne Ion Partner API — Authentication. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-access-token
      description: Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: streamone-ion-authentication.getaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
