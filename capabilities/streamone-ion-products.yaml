naftiko: 1.0.0-alpha2
info:
  label: TD SYNNEX StreamOne Ion Partner API — Products
  description: 'TD SYNNEX StreamOne Ion Partner API — Products. 4 operations. Lead operation: List Products. Self-contained
    Naftiko capability covering one Td Synnex business surface.'
  tags:
  - Td Synnex
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TD_SYNNEX_API_KEY: TD_SYNNEX_API_KEY
capability:
  consumes:
  - type: http
    namespace: streamone-ion-products
    baseUri: https://ion.tdsynnex.com
    description: TD SYNNEX StreamOne Ion Partner API — Products business capability. Self-contained, no shared references.
    resources:
    - name: v3-accounts-accountId-products
      path: /v3/accounts/{accountId}/products
      operations:
      - name: listproducts
        method: GET
        description: List Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vendor
          in: query
          type: string
          description: Filter by vendor name
        - name: category
          in: query
          type: string
          description: Filter by product category
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
    - name: v3-accounts-accountId-products-categories
      path: /v3/accounts/{accountId}/products/categories
      operations:
      - name: listproductcategories
        method: PUT
        description: List Product Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-accounts-accountId-products-verticals
      path: /v3/accounts/{accountId}/products/verticals
      operations:
      - name: listproductverticals
        method: POST
        description: List Product Verticals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-accounts-accountId-products-productId
      path: /v3/accounts/{accountId}/products/{productId}
      operations:
      - name: getproduct
        method: GET
        description: Get Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: string
          description: Unique product identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.TD_SYNNEX_API_KEY}}'
  exposes:
  - type: rest
    namespace: streamone-ion-products-rest
    port: 8080
    description: REST adapter for TD SYNNEX StreamOne Ion Partner API — Products. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v3/accounts/{accountid}/products
      name: v3-accounts-accountid-products
      description: REST surface for v3-accounts-accountId-products.
      operations:
      - method: GET
        name: listproducts
        description: List Products
        call: streamone-ion-products.listproducts
        with:
          vendor: rest.vendor
          category: rest.category
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/accounts/{accountid}/products/categories
      name: v3-accounts-accountid-products-categories
      description: REST surface for v3-accounts-accountId-products-categories.
      operations:
      - method: PUT
        name: listproductcategories
        description: List Product Categories
        call: streamone-ion-products.listproductcategories
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/accounts/{accountid}/products/verticals
      name: v3-accounts-accountid-products-verticals
      description: REST surface for v3-accounts-accountId-products-verticals.
      operations:
      - method: POST
        name: listproductverticals
        description: List Product Verticals
        call: streamone-ion-products.listproductverticals
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/accounts/{accountid}/products/{productid}
      name: v3-accounts-accountid-products-productid
      description: REST surface for v3-accounts-accountId-products-productId.
      operations:
      - method: GET
        name: getproduct
        description: Get Product
        call: streamone-ion-products.getproduct
        with:
          productId: rest.productId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streamone-ion-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for TD SYNNEX StreamOne Ion Partner API — Products. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-products
      description: List Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streamone-ion-products.listproducts
      with:
        vendor: tools.vendor
        category: tools.category
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: list-product-categories
      description: List Product Categories
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: streamone-ion-products.listproductcategories
      outputParameters:
      - type: object
        mapping: $.
    - name: list-product-verticals
      description: List Product Verticals
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: streamone-ion-products.listproductverticals
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: streamone-ion-products.getproduct
      with:
        productId: tools.productId
      outputParameters:
      - type: object
        mapping: $.
